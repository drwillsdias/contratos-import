<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Auditoria · Contratos Onerosos SPU</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f18;--surf:#161927;--surf2:#1e2235;--surf3:#252a40;
  --border:#2c3050;--border2:#3a4060;
  --green:#4caf7d;--green-bg:rgba(76,175,125,.12);--green-bd:rgba(76,175,125,.3);
  --red:#e05252;--red-bg:rgba(224,82,82,.12);--red-bd:rgba(224,82,82,.3);
  --amber:#f59e0b;--blue:#4b8ef1;
  --text:#dde2f0;--muted:#6b7592;--muted2:#8890aa;
  --accent:#4b8ef1;--accent2:#2d6fd4;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh}
header{background:var(--surf);border-bottom:1px solid var(--border);padding:14px 24px;
  display:flex;align-items:center;gap:14px}
.badge{background:linear-gradient(135deg,#1e7fc2,#1556a0);color:#fff;font-weight:700;
  font-size:10px;letter-spacing:1.5px;padding:5px 11px;border-radius:5px;text-transform:uppercase}
header h1{font-size:15px;font-weight:600}
.sub{font-size:11px;color:var(--muted);margin-left:auto}
/* KPIs */
.kpi-bar{display:flex;gap:10px;padding:14px 24px;background:var(--surf);
  border-bottom:1px solid var(--border);flex-wrap:wrap}
.kpi{flex:1;min-width:150px;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--r2);padding:12px 16px}
.kv{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:5px}
.ksub{font-size:11px;margin-top:5px;font-family:'JetBrains Mono',monospace}
.kpi.g .kv,.kpi.g .ksub{color:var(--green)}
.kpi.r .kv,.kpi.r .ksub{color:var(--red)}
.kpi.b .kv{color:var(--blue)}
/* Filters */
.fp{background:var(--surf);border-bottom:1px solid var(--border);padding:14px 24px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px;min-width:130px}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
select,input[type=text]{background:var(--surf2);border:1px solid var(--border2);color:var(--text);
  padding:7px 10px;border-radius:var(--r);font-size:12px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s;width:100%}
select:focus,input:focus{border-color:var(--accent)}
.fg.s{flex:2;min-width:220px}
.btn{background:var(--surf2);border:1px solid var(--border2);color:var(--muted);
  padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;
  font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;align-self:flex-end}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.save{border-color:rgba(76,175,125,.5);color:var(--green);display:none;align-items:center;gap:5px}
.btn.save.on{display:inline-flex}
.btn.save:hover{background:var(--green-bg)}
/* Result bar */
.rb{padding:8px 24px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);
  display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.rb strong{color:var(--text)}
/* Table */
.tw{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 295px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surf2);border:1px solid var(--border);padding:8px 10px;
  text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.7px;
  color:var(--muted2);white-space:nowrap;cursor:pointer;user-select:none;
  position:sticky;top:0;z-index:10}
thead th:hover,thead th.sorted{color:var(--accent)}
thead th.ns{cursor:default}thead th.ns:hover{color:var(--muted2)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--surf2)}
tbody td{padding:7px 10px;border-right:1px solid var(--border);vertical-align:middle}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.tspu{color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:11px}
.bs{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;
  font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;user-select:none;border:1px solid}
.bs.sim{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.bs.nao{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.bs.ext{background:rgba(107,114,128,.12);color:#9ca3af;border:1px solid rgba(107,114,128,.3)}
.bs:hover{filter:brightness(1.2);transform:scale(1.04)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;flex-shrink:0}
.cc{max-width:220px;color:var(--amber);font-size:11px;line-height:1.4}
.cc.e{color:var(--muted)}
.vc{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right;white-space:nowrap}
.interested{max-width:180px;font-size:11px;line-height:1.3;color:var(--text)}
.chg{color:var(--amber);font-size:10px;margin-left:4px}
.ar{color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}
.empty{text-align:center;padding:60px;color:var(--muted)}
/* Pagination */
.pag{display:flex;gap:8px;align-items:center;justify-content:center;padding:16px;flex-wrap:wrap}
.pb{background:var(--surf2);border:1px solid var(--border);color:var(--muted);
  padding:5px 13px;border-radius:var(--r);cursor:pointer;font-size:11px;
  font-family:'Inter',sans-serif;transition:all .15s}
.pb:hover{background:var(--accent2);border-color:var(--accent);color:#fff}
.pb:disabled{opacity:.3;cursor:not-allowed}
.pi{font-size:11px;color:var(--muted)}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surf2);border:1px solid var(--green-bd);
  color:var(--green);padding:10px 18px;border-radius:var(--r);font-size:12px;z-index:999;
  opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
/* Modal */
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;align-items:center;justify-content:center}
.mb.open{display:flex}
.mo{background:var(--surf);border:1px solid var(--border2);border-radius:var(--r2);
  padding:24px;max-width:740px;width:92%;max-height:88vh;overflow-y:auto;position:relative}
.mc{position:absolute;top:14px;right:14px;background:var(--surf2);border:1px solid var(--border);
  color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px}
.mo h2{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mf{background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.mf.full{grid-column:1/-1}
.fl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:3px}
.fv{font-size:12px;font-weight:500;line-height:1.4;word-break:break-word}
.st{font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);
  margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qi{background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:7px 10px}
.ql{font-size:9px;color:var(--muted);margin-bottom:2px;line-height:1.3}
.qv{font-size:11px;font-weight:500}
.cb{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);
  border-radius:6px;padding:10px 14px;color:var(--amber);font-size:12px;line-height:1.5}
.nc{color:var(--muted);font-style:italic;font-size:11px}
.toggle-btn{display:inline-flex;align-items:center;gap:8px;margin-top:14px;
  padding:9px 18px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;
  font-family:'Inter',sans-serif;transition:all .2s;border:1px solid}
.toggle-btn.to-sim{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.toggle-btn.to-nao{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.toggle-btn.to-ext{background:rgba(107,114,128,.1);color:#9ca3af;border-color:rgba(107,114,128,.3)}
.toggle-btn:hover{filter:brightness(1.15)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<header>
  <span class="badge">SPU</span>
  <h1>Painel de Auditoria · Contratos Onerosos</h1>
  <span class="sub">242 contratos · 93 importados · 2026</span>
</header>
<div class="kpi-bar" id="kpiBar"></div>
<div class="fp">

  <div class="fg"><label>No MGC</label>

  <div class="fg"><label>Auditor</label>

  <div class="fg"><label>Comentário</label>

  <div class="fg"><label>Tipo de comentário</label>
    <select id="fTipo"><option value="">Todos</option><option value="cessao">Cessão especial</option><option value="anual">Periodicidade anual</option></select></div>
  <div class="fg"><label>Vigente (Q9)</label>
    <select id="fVig"><option value="">Todos</option><option value="Sim">Sim</option><option value="Não">Não</option></select></div>
  <div class="fg"><label>Lançamentos (Q14)</label>
    <select id="fLanc"><option value="">Todos</option><option value="Completo">Completo</option><option value="Incompleto">Incompleto</option></select></div>
  <div class="fg"><label>Indexador (Q3)</label>
    <select id="fIdx"><option value="">Todos</option><option value="AUSENTE">AUSENTE</option><option value="IGP-M">IGP-M</option><option value="INPC">INPC</option><option value="IPCA">IPCA</option><option value="IPCA-E">IPCA-E</option></select></div>
  <button class="btn" onclick="resetF()">↺ Limpar</button>
  <button class="btn save" id="btnSave" onclick="exportCSV()">⬇ Exportar CSV</button>
</div>
<div class="rb">
  <span id="rc">Carregando...</span>
  <span id="ri" style="color:var(--green)"></span>
  <span id="rn" style="color:var(--red)"></span>
  <span id="chgInfo" style="color:var(--amber);margin-left:auto;font-weight:600"></span>
</div>
<div class="tw">
  <table>
    <thead><tr>
      <th onclick="sb('spu_uf')">SPU/UF ↕</th>
      <th onclick="sb('n_contrato')">N. Contrato ↕</th>
      <th onclick="sb('interessado')">Interessado ↕</th>
      <th onclick="sb('cnpj')">CPF/CNPJ ↕</th>
      <th onclick="sb('importado')">Importado ↕</th>
      <th onclick="sb('cor')">Cor ↕</th>
      <th onclick="sb('no_mgc')">No MGC ↕</th>
      <th onclick="sb('q1')">Valor Original ↕</th>
      <th onclick="sb('valor_atualizado')">Valor Atualizado ↕</th>
      <th>Comentário</th>
      <th onclick="sb('q9')">Vigente ↕</th>
      <th onclick="sb('q14')">Lançamentos ↕</th>
      <th class="ns"></th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div class="empty" id="es" style="display:none">
    <div style="font-size:40px;margin-bottom:12px">🔍</div>Nenhum contrato encontrado.
  </div>
</div>
<div class="pag" id="pg"></div>
<div class="toast" id="toast"></div>
<div class="mb" id="mbg" onclick="cbg(event)">
  <div class="mo"><button class="mc" onclick="cm()">✕</button><div id="mbd"></div></div>
</div>

  s=String(s).trim().replace(',','.');

  const n=parseFloat(s); return isNaN(n)?0:n;
}
function brl(v){
  if(!v||v===0) return '—';
  return 'R$\u00a0'+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function trunc(s,n){ return s&&s.length>n ? s.slice(0,n)+'…' : (s||''); }


function matchTipo(comentario, tipo) {
  if (!tipo) return true;
  const c = (comentario||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (tipo === 'cessao') {
    return /cess[aã]o|especial|condi[cç][oõ]es especiais/.test(c);
  }
  if (tipo === 'anual') {
    return /\banual\b|periodicidade anual|periodicidade [eé] anual|pagamento anual/.test(c);
  }
  return true;
}

function flt(){
  const s  =document.getElementById('fSearch').value.toLowerCase();
  const imp=document.getElementById('fImp').value;
  const spu=document.getElementById('fSPU').value;
  const cor=document.getElementById('fCor').value;
  const mgc=document.getElementById('fMGC').value;
  const aud=document.getElementById('fAud').value;
  const cmt=document.getElementById('fCmt').value;
  const vig=document.getElementById('fVig').value;
  const lanc=document.getElementById('fLanc').value;
  const idx=document.getElementById('fIdx').value;
  const tipo=document.getElementById('fTipo').value;
  fil=all.filter(r=>{
    if(imp&&r.importado!==imp)return false;
    if(spu&&r.spu_uf!==spu)return false;
    if(cor&&r.cor!==cor)return false;
    if(mgc&&r.no_mgc!==mgc)return false;
    if(aud&&r.auditor!==aud)return false;
    if(cmt==='com'&&!r.comentario)return false;
    if(cmt==='sem'&&r.comentario)return false;
    if(vig&&r.q9!==vig)return false;
    if(lanc&&r.q14!==lanc)return false;
    if(idx&&r.q3!==idx)return false;
    if(tipo&&!matchTipo(r.comentario,tipo))return false;
    if(s){const h=[r.spu_uf,r.n_contrato,r.interessado,r.cnpj,r.processo,r.comentario,r.sei].join(' ').toLowerCase();if(!h.includes(s))return false;}
    return true;
  });
  if(sc) fil.sort((a,b)=>{
    if(sc==='q1'||sc==='valor_atualizado'){return(pv(a[sc])-pv(b[sc]))*sd;}
    const av=(a[sc]||'').toLowerCase(),bv=(b[sc]||'').toLowerCase();
    return av<bv?-sd:av>bv?sd:0;
  });
  pg=1; rk(); rt(); rp();
}

function sb(c){if(sc===c)sd*=-1;else{sc=c;sd=1;}flt();}
function resetF(){
  ['fSearch','fImp','fSPU','fCor','fMGC','fAud','fCmt','fTipo','fVig','fLanc','fIdx']
    .forEach(id=>document.getElementById(id).value='');
  flt();
}

function rk(){
  const t=fil.length;
  const sim=fil.filter(r=>r.importado==='Sim');
  const nao=fil.filter(r=>r.importado==='Não');
  const ext=fil.filter(r=>r.importado==='Extinto');
  const ativos=sim.length+nao.length;
  const pct=ativos?Math.round(sim.length/ativos*100):0;
  const vSim=sim.reduce((a,r)=>a+pv(r.valor_atualizado||r.q1),0);
  const vNao=nao.reduce((a,r)=>a+pv(r.valor_atualizado||r.q1),0);
  document.getElementById('kpiBar').innerHTML=`
    <div class="kpi"><div class="kv">${t}</div><div class="kl">Total contratos</div></div>
    <div class="kpi g">
      <div class="kv">${sim.length}</div><div class="kl">✅ Importados</div>
      <div class="ksub">${brl(vSim)}</div>
    </div>
    <div class="kpi r">
      <div class="kv">${nao.length}</div><div class="kl">❌ Não importados</div>
      <div class="ksub">${brl(vNao)}</div>
    </div>
    <div class="kpi b"><div class="kv">${pct}%</div><div class="kl">Taxa (ativos)</div></div>
    <div class="kpi" style="border-color:rgba(107,114,128,.3)"><div class="kv" style="color:#9ca3af">${ext.length}</div><div class="kl" style="color:#6b7592">⬜ Extintos</div></div>`;
  document.getElementById('rc').innerHTML=`<strong>${t}</strong> contratos`;
  document.getElementById('ri').textContent=`✅ ${sim.length} importados`;
  document.getElementById('rn').textContent=`❌ ${nao.length} não importados`;
  const nch=Object.keys(changes).length;
  document.getElementById('chgInfo').textContent=nch?`✏️ ${nch} alteração(ões) pendente(s)`:'';
  document.getElementById('btnSave').classList.toggle('on',nch>0);
}

function rt(){
  const start=(pg-1)*PG, rows=fil.slice(start,start+PG);
  const tb=document.getElementById('tb'),es=document.getElementById('es');
  if(!rows.length){tb.innerHTML='';es.style.display='';return;}
  es.style.display='none';
  tb.innerHTML=rows.map((r,i)=>{
    const col=CC[r.cor]||'#555';
    const hc=!!r.comentario;
    const vOrig=pv(r.q1), vAtual=pv(r.valor_atualizado);
    const key=r.n_contrato+r.spu_uf;
    const changed=changes[key]?'<span class="chg">⚡</span>':'';
    return `<tr>
      <td><span class="tspu">${r.spu_uf||'—'}</span></td>
      <td><span class="mono">${r.n_contrato||'<i style="color:var(--muted)">s/n°</i>'}</span>${changed}</td>
      <td class="interested">${trunc(r.interessado,30)||'<span style="color:var(--muted)">—</span>'}</td>
      <td class="mono" style="font-size:10px;white-space:nowrap">${r.cnpj||'—'}</td>
      <td><span class="bs ${r.importado==='Sim'?'sim':r.importado==='Extinto'?'ext':'nao'}" onclick="tgl(event,${start+i})" title="Clique para alternar">${r.importado==='Sim'?'✅':r.importado==='Extinto'?'⬜':'❌'} ${r.importado}</span></td>
      <td><span class="dot" style="background:${col}"></span>${r.cor}</td>
      <td>${r.no_mgc||'—'}</td>
      <td class="vc">${vOrig>0?brl(vOrig):(r.q1||'—')}</td>
      <td class="vc">${vAtual>0?brl(vAtual):'—'}</td>
      <td class="cc ${hc?'':'e'}">${hc?trunc(r.comentario,75):'—'}</td>
      <td>${r.q9||'—'}</td>
      <td>${r.q14||'—'}</td>
      <td class="ar" onclick="om(${start+i})">›</td>
    </tr>`;
  }).join('');
}

function rp(){
  const tot=Math.ceil(fil.length/PG), pb=document.getElementById('pg');
  if(tot<=1){pb.innerHTML='';return;}
  pb.innerHTML=`<button class="pb" onclick="gp(${pg-1})" ${pg===1?'disabled':''}>← Anterior</button><span class="pi">Página ${pg} de ${tot}</span><button class="pb" onclick="gp(${pg+1})" ${pg===tot?'disabled':''}>Próxima →</button>`;
}
function gp(p){const tot=Math.ceil(fil.length/PG);if(p<1||p>tot)return;pg=p;rt();rp();document.querySelector('.tw').scrollTop=0;}

function tgl(e,idx){
  e.stopPropagation();
  const r=fil[idx];
  const novo=r.importado==='Sim'?'Não':r.importado==='Não'?'Extinto':'Sim';
  const key=r.n_contrato+r.spu_uf;
  r.importado=novo;
  const ai=all.findIndex(a=>a.n_contrato===r.n_contrato&&a.spu_uf===r.spu_uf);
  if(ai>=0) all[ai].importado=novo;
  const orig=RDATA.find(a=>a.n_contrato===r.n_contrato&&a.spu_uf===r.spu_uf);
  if(orig&&orig.importado!==novo) changes[key]={n_contrato:r.n_contrato,spu_uf:r.spu_uf,original:orig.importado,novo};
  else delete changes[key];
  toast(`${r.n_contrato||r.spu_uf}: ${novo==='Sim'?'✅ Importado':'❌ Não Importado'}`);
  rk(); rt(); rp();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2800);
}

function exportCSV(){
  const ch=Object.values(changes);
  if(!ch.length) return;
  const rows=['N. Contrato,SPU/UF,Status Anterior,Novo Status'];
  ch.forEach(c=>rows.push(`"${c.n_contrato}","${c.spu_uf}","${c.original}","${c.novo}"`));
  const blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='alteracoes_importacao.csv';a.click();
  toast('CSV exportado!');
}

function om(idx){
  const r=fil[idx],col=CC[r.cor]||'#555';
  const vOrig=pv(r.q1),vAtual=pv(r.valor_atualizado);
  const qi=Object.entries(S).map(([n,s])=>`<div class="qi"><div class="ql">${n}. ${s}</div><div class="qv">${r['q'+n]||'<span style="color:var(--muted)">—</span>'}</div></div>`).join('');
  const isSim=r.importado==='Sim';const isExt=r.importado==='Extinto';
  document.getElementById('mbd').innerHTML=`
    <h2><span class="dot" style="background:${col};width:13px;height:13px"></span>
      <span class="mono" style="font-size:13px">${r.n_contrato||'Sem número'}</span>
      <span class="bs ${r.importado==='Sim'?'sim':r.importado==='Extinto'?'ext':'nao'}">${r.importado==='Sim'?'✅':r.importado==='Extinto'?'⬜':'❌'} ${r.importado}</span>
    </h2>
    <div class="mg">
      <div class="mf"><div class="fl">SPU/UF</div><div class="fv tspu">${r.spu_uf||'—'}</div></div>
      <div class="mf"><div class="fl">Auditor</div><div class="fv">${r.auditor||'—'}</div></div>
      <div class="mf full"><div class="fl">Interessado</div><div class="fv">${r.interessado||'<span style="color:var(--muted)">—</span>'}</div></div>
      <div class="mf full"><div class="fl">CPF/CNPJ</div><div class="fv mono">${r.cnpj||'<span style="color:var(--muted)">—</span>'}</div></div>
      <div class="mf full"><div class="fl">N. Contrato</div><div class="fv mono">${r.n_contrato||'—'}</div></div>
      <div class="mf full"><div class="fl">Número do Processo</div><div class="fv mono">${r.processo||'—'}</div></div>
      <div class="mf full"><div class="fl">N. SEI</div><div class="fv">${r.sei||'—'}</div></div>
      <div class="mf"><div class="fl">No MGC</div><div class="fv">${r.no_mgc||'—'}</div></div>
      <div class="mf"><div class="fl">Cor</div><div class="fv"><span class="dot" style="background:${col}"></span>${r.cor}</div></div>
      <div class="mf"><div class="fl">Valor Original Anual</div><div class="fv mono" style="color:var(--amber)">${vOrig>0?brl(vOrig):(r.q1||'—')}</div></div>
      <div class="mf"><div class="fl">Valor Atualizado</div><div class="fv mono" style="color:var(--green)">${vAtual>0?brl(vAtual):'—'}</div></div>
    </div>
    ${r.comentario?`<div class="st">💬 Comentário</div><div class="cb">${r.comentario}</div>`:''}
    <button class="toggle-btn ${isSim?'to-nao':'to-sim'}" onclick="tglModal(${idx})">${isSim?'❌ Marcar como Não Importado':'✅ Marcar como Importado'}</button>
    <div class="st">Questionário</div><div class="qg">${qi}</div>`;
  document.getElementById('mbg').classList.add('open');
}

function tglModal(idx){tgl({stopPropagation:()=>{}},idx);cm();}
function cbg(e){if(e.target===document.getElementById('mbg'))cm();}
function cm(){document.getElementById('mbg').classList.remove('open');}
document.addEventListener('keydown',e=>e.key==='Escape'&&cm());
['fSearch','fImp','fSPU','fCor','fMGC','fAud','fCmt','fTipo','fVig','fLanc','fIdx']
  .forEach(id=>document.getElementById(id).addEventListener('input',flt));
flt();
</script>
